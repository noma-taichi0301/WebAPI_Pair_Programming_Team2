<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン</title>
    <link rel="stylesheet" href="../css/Style.css">
</head>

<body class="auth-body">

    <!-- /* ヘッダー */ -->
    <header class="auth-header">
        <a href="#" class="logo">NomaChat</a>
    </header>

    <main class="auth-container">
        <section class="auth-card">
            <!-- /* ログインフォーム */ -->
            <h1>ログイン</h1>
            <p class="auth-subtitle">NomaChatへようこそ</p>
            <input id="userName" class="auth-input" placeholder="ユーザー名">
            <input id="password" class="auth-input" type="password" placeholder="パスワード">
            <button id="loginButton" class="primary-button">ログイン</button>

            <!-- /* ユーザー登録画面遷移ボタン */ -->
            <button class="link-button" onclick="location.href='AddUser.html'">
                新規登録はこちら
            </button>

            <!-- /* エラー表示メッセージ */ -->
            <p id="errorMessage" class="error-message"></p>
        </section>
    </main>

    <!-- /* JS */ -->
    <script src="../js/Login.js"></script>
</body>

</html>
