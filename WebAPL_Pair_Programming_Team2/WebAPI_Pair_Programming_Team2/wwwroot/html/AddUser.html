<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ユーザー新規登録</title>
    <link rel="stylesheet" href="../css/Style.css">
</head>
<body>
    <!-- /* ヘッダー */ -->
    <header>
        <a href="#" class="logo">NomaChat</a>
    </header>

    <!-- /* 登録フォーム */ -->
    <div class="register-form">
        <h1>ユーザー新規登録</h1>
        <input id="addUserName" placeholder="ユーザー名">
        <input id="addPassword" type="password" placeholder="パスワード">
        <button id="addUserButton">新規登録</button>
    </div>

    <!-- /* ログイン画面に戻るボタン */ -->
    <button onclick="location.href='Login.html'">ログイン画面に戻る</button>

    <!-- /* エラー表示メッセージ */ -->
    <p id="addErrorMessage"></p>

    <!-- /* JS */ -->
    <script src="../js/AddUser.js"></script>

</body>
</html>
